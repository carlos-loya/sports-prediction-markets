leagues:
  soccer:
    - name: "Premier League"
      fbref_id: "9"
      country: "England"
      seasons: ["2024-2025", "2023-2024"]
    - name: "La Liga"
      fbref_id: "12"
      country: "Spain"
      seasons: ["2024-2025", "2023-2024"]
    - name: "Serie A"
      fbref_id: "11"
      country: "Italy"
      seasons: ["2024-2025", "2023-2024"]
    - name: "Bundesliga"
      fbref_id: "20"
      country: "Germany"
      seasons: ["2024-2025", "2023-2024"]
    - name: "Ligue 1"
      fbref_id: "13"
      country: "France"
      seasons: ["2024-2025", "2023-2024"]

  basketball:
    - name: "NBA"
      seasons: ["2024-25", "2023-24"]

rate_limits:
  fbref:
    requests_per_minute: 8
  nba_api:
    requests_per_minute: 30
  kalshi:
    reads_per_second: 20

edge_detection:
  min_edge_pct: 0.05
  min_volume: 100
  min_time_to_close_hours: 1
  kelly_fraction: 0.25
  confidence_levels:
    high: 0.10
    medium: 0.07
    low: 0.05

models:
  elo:
    initial_rating: 1500
    k_factor_soccer: 32
    k_factor_nba: 20
    home_advantage_soccer: 65
    home_advantage_nba: 100
  poisson:
    league_avg_goals: 1.35
  pace_adjusted:
    league_avg_pace: 100.0

storage:
  bronze_path: "data/bronze"
  silver_path: "data/silver"
  gold_path: "data/gold"
  duckdb_path: "data/gold/sports_analytics.duckdb"

realtime:
  kafka:
    bootstrap_servers: "localhost:9092"
    client_id: "sports-rt"
    group_id: "sports-rt-group"
  websocket:
    url: "wss://api.elections.kalshi.com/trade-api/ws/v2"
    channels:
      - "ticker"
      - "trade"
      - "orderbook_delta"
      - "fill"
      - "market_lifecycle_v2"
    reconnect_delay_initial: 1.0
    reconnect_delay_max: 60.0
    ping_interval: 10.0
  vpin:
    bucket_size: 50
    n_buckets: 50
    threshold_elevated: 0.3
    threshold_critical: 0.6
  entropy:
    min_price: 0.30
    max_price: 0.70
  market_maker:
    enabled: false
    gamma: 0.1
    kappa: 1.5
    sigma_window: 100
    min_spread_cents: 2
    max_position: 50
  risk:
    max_position_per_market: 100
    max_total_exposure: 5000.0
    daily_loss_limit: 500.0
    emergency_loss_limit: 1000.0
    gtd_expiry_minutes: 10
  kelly:
    n_simulations: 10000
    fraction: 0.25
    max_bankroll_pct: 0.20
  fees:
    taker_fee_cents: 7.0
    maker_rebate_cents: 0.0
    slippage_cents: 1.0
    min_tradable_edge: 0.03
  telegram:
    enabled: false
  target_series:
    series_tickers:
      - "KXNBA"
      - "KXNFL"
      - "KXMLB"
      - "KXNHL"
      - "KXSOCCER"
      - "KXMMA"
  model_cache_refresh_seconds: 300
  paper_mode: true
  discovery_interval_seconds: 300
  bankroll: 10000.0
